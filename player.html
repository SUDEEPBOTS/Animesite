<!doctype html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Kaito Anime Player</title>
    <style>
        :root { --primary: #9333ea; --body:#09090b; }
        body { background-color: var(--body); color: white; font-family: sans-serif; margin: 0; }
        .cont { max-width: 800px; margin: 0 auto; padding: 10px; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; border: 2px solid #1e293b; }
        iframe { width: 100%; height: 100%; border: none; }
        .info-box { padding: 15px; background: #111827; margin: 15px 0; border-radius: 12px; border: 1px solid #1e293b; }
    </style>
</head>
<body>
    <div class="cont">
        <header style="text-align: center; padding: 20px;">
            <h1 style="margin:0;">KAITO <span style="color:var(--primary)">ANIME</span></h1>
        </header>

        <div class="info-box">
            <h2 id="anime-title" style="margin:0; font-size: 1.2rem;">Loading...</h2>
            <p id="episode-info" style="color: #94a3b8; font-size: 0.9rem; margin: 5px 0 0;">Streaming from Secure Server</p>
        </div>

        <div class="video-container" id="player-wrapper">
            <div style="display:flex; justify-content:center; align-items:center; height:100%;">
                <p>Establishing Connection... 🚀</p>
            </div>
        </div>
        
        <p style="text-align:center; font-size:0.8rem; color:#444;">Bhai Kaito, if video doesn't load, refresh once.</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        let epId = params.get('id');

        if (epId) {
            epId = epId.replace(/\/$/, ""); 
            document.getElementById('anime-title').innerText = epId.split('-').join(' ').toUpperCase();

            // Naya Stable Source: GogoAnime Embed
            // Format: one-piece-episode-35
            let cleanId = epId.replace('-1x', '-episode-');
            
            // Hum direct GogoAnime ka stable embed use karenge
            const embedUrl = `https://playtuna.xyz/download?id=${cleanId}`;
            
            document.getElementById('player-wrapper').innerHTML = `
                <iframe src="${embedUrl}" allowfullscreen scrolling="no"></iframe>
            `;
        }
    </script>
</body>
</html>
