<!doctype html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Kaito Anime Player</title>
    <link rel='stylesheet' href='/wp-content/themes/torofilm/public/css/torofilm-public.css' type='text/css' media='all' />
    <style>
        :root { --primary: #9333ea; --body:#09090b; }
        .video-container { width: 100%; height: 500px; background: #000; border-radius: 12px; overflow: hidden; margin: 10px 0; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body style="background-color: var(--body); color: white;">
    <div id="aa-wp" class="cont">
        <header style="padding: 20px; text-align: center;">
            <h1 style="color:white;">KAITO <span style="color:var(--primary)">ANIME</span></h1>
        </header>

        <div id="anime-info" style="padding: 15px; background: rgba(255,255,255,0.05); margin: 15px; border-radius: 12px;">
            <h2 id="anime-title" style="font-size: 1.4rem;">Loading Anime...</h2>
            <p id="episode-info" style="color: #94a3b8;">Fetching episode details...</p>
        </div>

        <div class="video-container" id="player-wrapper">
            <div style="display:flex; justify-content:center; align-items:center; height:100%;">
                <p>Connecting to Secure Servers...</p>
            </div>
        </div>
    </div>

    <script>
        // URL se ID nikaalo (e.g. ?id=one-piece-1x35)
        const params = new URLSearchParams(window.location.search);
        let epId = params.get('id');

        if (epId) {
            epId = epId.replace(/\/$/, ""); // Aakhri slash hatao
            document.getElementById('anime-title').innerText = epId.split('-').join(' ').toUpperCase();
            document.getElementById('episode-info').innerText = "Streaming: " + epId;

            // GogoAnime format mein convert karo: one-piece-1x35 -> one-piece-episode-35
            let cleanId = epId.replace('-1x', '-episode-');
            
            // Player inject karo (Using a free stable embed provider)
            const embedUrl = `https://anime-embed-player.vercel.app/e/${cleanId}`;
            document.getElementById('player-wrapper').innerHTML = `<iframe src="${embedUrl}" allowfullscreen></iframe>`;
        } else {
            document.getElementById('player-wrapper').innerHTML = "<p style='text-align:center; padding:50px;'>No Episode ID found! Go back to Home.</p>";
        }
    </script>
</body>
</html>
